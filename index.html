<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження та обробка Excel файлу</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script> <!-- Бібліотека для роботи з Excel -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        h2 {
            text-align: center;
        }
        .form-container {
            margin: 0 auto;
            width: 50%;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-container button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .form-container button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Завантаження та обробка Excel файлу</h2>

        <!-- Форма для завантаження файлу та введення параметрів -->
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
        <input type="number" id="maxPrice" placeholder="Максимальна ціна" />
        <input type="number" id="maxWeight" placeholder="Максимальна вага" />
        <button onclick="processFile()">Обробити файл</button>
    </div>

    <div class="table-container">
        <!-- Тут буде відображатися таблиця з даними -->
        <table id="dataTable"></table>
    </div>

    <script>
        let originalData = [];  // Змінна для збереження оригінальних даних

        // Обробка файлу після вибору
        document.getElementById('fileInput').addEventListener('change', handleFileSelect, false);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // Отримуємо перший лист з файлу
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];

                // Перетворюємо дані в JSON (зчитуємо як масив масивів)
                originalData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                console.log("Оригінальні дані:", originalData);

                // Відобразимо таблицю на сторінці
                displayTable(originalData);
            };
            reader.readAsArrayBuffer(file);
        }

        // Функція для відображення таблиці на сторінці
        function displayTable(data) {
            const table = document.getElementById('dataTable');
            table.innerHTML = ''; // Очищаємо таблицю перед додаванням нових даних

            // Заголовки таблиці
            const header = data[0];
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            header.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });

            // Тіла таблиці
            const tbody = table.createTBody();
            data.slice(1).forEach(row => {
                const tr = tbody.insertRow();
                row.forEach(cell => {
                    const td = tr.insertCell();
                    td.textContent = cell;
                });
            });
        }

        // Обробка файлу після введення параметрів
        function processFile() {
            const maxPrice = parseFloat(document.getElementById('maxPrice').value);
            const maxWeight = parseFloat(document.getElementById('maxWeight').value);

            if (!originalData.length) {
                alert('Будь ласка, завантажте файл!');
                return;
            }

            if (isNaN(maxPrice) || isNaN(maxWeight)) {
                alert('Будь ласка, введіть правильні значення для ціни та ваги!');
                return;
            }

            // Фільтруємо дані по максимальній ціні та вазі
            const filteredData = originalData.filter(row => {
                // Припускаємо, що ціна в колонці 1, а вага — в колонці 2
                const price = parseFloat(row[1]);
                const weight = parseFloat(row[2]);

                // Перевірка, чи значення ціни та ваги є числовими і не перевищують максимуми
                return !isNaN(price) && !isNaN(weight) && price <= maxPrice && weight <= maxWeight;
            });

            console.log("Відфільтровані дані:", filteredData);

            // Генерація нового Excel файлу
            const newWorkbook = XLSX.utils.book_new();
            const newWorksheet = XLSX.utils.aoa_to_sheet(filteredData);

            XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, 'Filtered Data');

            // Генерація та завантаження нового файлу
            const newFile = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'binary' });
            const blob = new Blob([s2ab(newFile)], { type: 'application/octet-stream' });

            // Створюємо посилання для скачування
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'filtered_data.xlsx';
            link.click();
        }

        // Функція для перетворення стрічки в ArrayBuffer
        function s2ab(str) {
            const buf = new ArrayBuffer(str.length);
            const view = new Uint8Array(buf);
            for (let i = 0; i < str.length; i++) {
                view[i] = str.charCodeAt(i) & 0xFF;
            }
            return buf;
        }
    </script>

</body>
</html>
